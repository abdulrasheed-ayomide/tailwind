<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge Card</title>
    <link href="../try/style.css" rel="stylesheet">

</head>
<body>
    <div class="w-[95%] m-auto mt-4 p-2 border  border-gray-400 rounded-[5px]">
        <h1 class="text-4xl font-bold text-blue-800 text-center mb-5">Recharge Card</h1>
        <div class="flex justify-between">
            <div class=" w-[55%] border border-gray-400 rounded-[5px] p-2">
                <label for="network" class="font-bold">Network</label>
                <div class="border border-gray-400 rounded-[5px] mt-2 font-medium">
                    <select name="network" id="network" class="w-full p-2 font-medium">
                        <option value="">Select Network</option>
                        <option value="mtn">MTN</option>
                        <option value="9mobile">9mobile</option>
                        <option value="airtel">Airtel</option>
                        <option value="glo">Glo</option>
                    </select>
                </div>

                <label for="amount" class="font-bold">Amount</label>
                <div class="border border-gray-400 rounded-[5px] mt-2 mb-2 font-medium">
                    <select name="amount" id="amount" class="w-full p-2 font-medium">
                        <option value="">Select Amount</option>
                        <option value="100">100</option>
                        <option value="200">200</option>
                        <option value="500">500</option>
                        <option value="1000">1000</option>
                    </select>
                </div>

                <label for="generatepin" class="font-bold">Generate Pin</label>
                <input type="text" name="" id="generateInp" class="w-full p-2 border border-gray-400 rounded-[5px] mt-2 font-medium" placeholder="Generate Recharge Code here" readonly>
                <button id="generateBtn" class="w-[45%] rounded-b-lg rounded-t-lg bg-blue-800 text-white py-3 mt-4 font-bold hover:bg-blue-600">Generate Pin</button>
                <button id="saveBtn" class="w-[20%] rounded-b-lg rounded-t-lg bg-blue-800 text-white py-3 mt-4 font-bold hover:bg-blue-600">Save</button>
                
            </div>

            <div class="w-[40%] border border-gray-400 rounded-[5px] p-2">
                <label for="rechargepin" class="font-bold">Recharge pin</label>
                <input type="text" name="" id="rechargepin" class="w-full p-2 border border-gray-400 rounded-[5px] mt-2 font-medium" placeholder="Enter Recharge Code here">
                <button id="rechargeBtn" class="w-[35%] rounded-b-lg rounded-t-lg bg-blue-800 text-white py-3 mt-4 font-bold hover:bg-blue-600">Recharge</button>

               <p class="mt-3"> <label for="search" class="font-bold">Search</label> </p>
                <input type="text" name="" id="search" class="w-full p-2 border border-gray-400 rounded-[5px] mt-2 font-medium" placeholder="Search Recharge Code here">
            </div>
        </div>


        
        <div class="relative mt-4 overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">

            <table class="min-w-251 w-full text-xs sm:text-sm text-left rtl:text-right text-body">
                
                <thead class="bg-neutral-secondary-soft border-b border-default">
                    <tr>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">S/N</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Network</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Amount</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Pin</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Recharged Code</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Status</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Date Created</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Date Used</th>
                        <th class="px-3 sm:px-6 py-2 sm:py-3 font-bold">Delete</th>
                    </tr>
                </thead>

                <tbody id="display">
                    <!-- rows here -->
                </tbody>

            </table>

        </div>
    </div>
    

    <script src="./index.js"></script>
</body>
</html>
